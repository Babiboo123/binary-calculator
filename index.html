<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHÓM 2</title>
    <style>
        :root {
            --primary-pink: #ff1493;
            --soft-pink: #ffb3d9;
            --bg-gradient: linear-gradient(135deg, #ffe5f0, #fff5fa, #ffe5f0);
            --glass-bg: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Hiệu ứng lấp lánh */
        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: -1;
            animation: float 6s infinite linear;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Container chính */
        .calculator-container {
            width: 100%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(255, 20, 147, 0.2);
            border: 8px solid #fff;
            position: relative;
            z-index: 10;
        }

        .casio-header {
            background: linear-gradient(45deg, #ff1493, #ff85c0);
            padding: 15px;
            border-radius: 25px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.3);
        }

        .casio-header h1 {
            color: white;
            font-size: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* Display */
        .display-section {
            background: #222;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 4px solid #ddd;
        }

        #display {
            width: 100%;
            font-size: 1.8rem;
            text-align: right;
            background: transparent;
            border: none;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            outline: none;
        }

        /* Input Area */
        .input-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--primary-pink);
            margin-bottom: 5px;
            margin-left: 10px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--soft-pink);
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-pink);
            box-shadow: 0 0 10px rgba(255, 20, 147, 0.1);
        }

        /* Bàn phím số & Phép tính */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 15px 5px;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            box-shadow: 0 4px 0 #d946a6;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #d946a6;
        }

        .btn-num { background: white; color: var(--primary-pink); }
        .btn-op { background: var(--soft-pink); color: white; }
        .btn-func { background: #ff4d94; color: white; }
        .btn-op.active { background: var(--primary-pink); transform: scale(0.95); }

        .btn-calc {
            grid-column: span 4;
            background: linear-gradient(to right, #ff1493, #ff69b4);
            color: white;
            font-size: 1.2rem;
            padding: 15px;
            margin-top: 5px;
        }

        /* Result Section */
        .conversion-grid {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .conv-box {
            background: white;
            padding: 10px;
            border-radius: 15px;
            border: 1px solid var(--soft-pink);
            text-align: center;
        }

        .conv-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .conv-val { font-size: 1rem; font-weight: bold; color: var(--primary-pink); word-break: break-all; }

        /* Responsive */
        @media (max-width: 400px) {
            .calculator-container { padding: 15px; border-width: 4px; }
            .btn { padding: 12px 2px; font-size: 0.9rem; }
            .casio-header h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <div class="casio-header">
            <h1>⋆. 𐙚˚ NHÓM 2  𝜗𝜚˚⋆</h1>
        </div>

        <div class="display-section">
            <input type="text" id="display" value="0" readonly>
        </div>

        <div class="input-wrapper">
            <div class="input-group">
                <label>SỐ A (Binary)</label>
                <input type="text" id="num1" placeholder="0000" readonly onclick="setActiveInput('num1')">
            </div>
            <div class="input-group">
                <label>SỐ B (Binary)</label>
                <input type="text" id="num2" placeholder="0000" readonly onclick="setActiveInput('num2')">
            </div>
        </div>

        <!-- Bàn phím tích hợp -->
        <div class="keypad">
            <button class="btn btn-num" onclick="press('1')">1</button>
            <button class="btn btn-num" onclick="press('0')">0</button>
            <button class="btn btn-func" onclick="press('back')">⌫</button>
            <button class="btn btn-func" onclick="press('clear')">AC</button>
            
            <button class="btn btn-op" onclick="selectOp('+', this)">+</button>
            <button class="btn btn-op" onclick="selectOp('-', this)">-</button>
            <button class="btn btn-op" onclick="selectOp('*', this)">×</button>
            <button class="btn btn-op" onclick="selectOp('/', this)">÷</button>

            <button class="btn btn-calc" onclick="calculate()">TÍNH TOÁN KẾT QUẢ</button>
        </div>

        <!-- Chuyển đổi hệ cơ số -->
        <div class="conversion-grid">
            <div class="conv-box">
                <div class="conv-label">Hệ 10 (Dec)</div>
                <div id="res-dec" class="conv-val">-</div>
            </div>
            <div class="conv-box">
                <div class="conv-label">Hệ 16 (Hex)</div>
                <div id="res-hex" class="conv-val">-</div>
            </div>
            <div class="conv-box">
                <div class="conv-label">Hệ 8 (Oct)</div>
                <div id="res-oct" class="conv-val">-</div>
            </div>
            <div class="conv-box" style="background: #fff0f5;">
                <div class="conv-label">Hệ 2 (Bin)</div>
                <div id="res-bin" class="conv-val">-</div>
            </div>
        </div>
    </div>

    <script>
        let currentInputId = 'num1';
        let currentOperator = null;
        const BITS = 8;

        // Tạo hiệu ứng trái tim bay
        function createSparkles() {
            const emojis = ['🌸', '✨', '💖', '⭐', '🎀'];
            for (let i = 0; i < 15; i++) {
                let s = document.createElement('div');
                s.className = 'sparkle';
                s.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                s.style.left = Math.random() * 100 + 'vw';
                s.style.animationDelay = Math.random() * 5 + 's';
                s.style.fontSize = (Math.random() * 20 + 10) + 'px';
                document.body.appendChild(s);
            }
        }
        createSparkles();

        function setActiveInput(id) {
            currentInputId = id;
            document.getElementById('num1').style.borderColor = (id === 'num1') ? '#ff1493' : '#ffb3d9';
            document.getElementById('num2').style.borderColor = (id === 'num2') ? '#ff1493' : '#ffb3d9';
        }

        function press(val) {
            let input = document.getElementById(currentInputId);
            if (val === 'clear') {
                input.value = '';
                resetResults();
            } else if (val === 'back') {
                input.value = input.value.slice(0, -1);
            } else {
                if (input.value.length < 12) input.value += val;
            }
        }

        function selectOp(op, btn) {
            currentOperator = op;
            document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            setActiveInput('num2'); // Tự động chuyển sang nhập số thứ 2
        }

        function binaryToSignedDec(bin) {
            let padded = bin.padStart(BITS, '0');
            let num = parseInt(padded, 2);
            if (padded[0] === '1') num = num - (1 << BITS);
            return num;
        }

        function decToBinary(num) {
            let n = num & ((1 << BITS) - 1);
            return n.toString(2).padStart(BITS, '0');
        }

        function resetResults() {
            document.getElementById('res-bin').innerText = '-';
            document.getElementById('res-dec').innerText = '-';
            document.getElementById('res-hex').innerText = '-';
            document.getElementById('res-oct').innerText = '-';
            document.getElementById('display').value = '0';
        }

        function calculate() {
            let a = document.getElementById("num1").value;
            let b = document.getElementById("num2").value;
            let display = document.getElementById("display");

            if (!a || !b || !currentOperator) {
                display.value = "ERROR : LỖI NHẬP";
                return;
            }

            try {
                let decA = parseInt(a, 2);
                let decB = parseInt(b, 2);
                let resultDec = 0;

                switch (currentOperator) {
                    case '+': resultDec = decA + decB; break;
                    case '-': resultDec = decA - decB; break;
                    case '*': resultDec = decA * decB; break;
                    case '/': 
                        if (decB === 0) { display.value = "ERROR : LỖI NHẬP"; return; }
                        resultDec = Math.floor(decA / decB); 
                        break;
                }

                // Cập nhật kết quả lên các hệ cơ số
                let resultBin = (resultDec >>> 0).toString(2);
                
                display.value = resultBin;
                document.getElementById('res-bin').innerText = resultBin;
                document.getElementById('res-dec').innerText = resultDec;
                document.getElementById('res-hex').innerText = (resultDec >>> 0).toString(16).toUpperCase();
                document.getElementById('res-oct').innerText = (resultDec >>> 0).toString(8);

            } catch (e) {
                display.value = "ERROR";
            }
        }

        // Khởi tạo mặc định
        setActiveInput('num1');
    </script>
</body>
</html>
